<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>俊宏</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --secondary: #86868b;
    --link: #0066cc;
    --separator: #d2d2d7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --text: #f5f5f7;
      --secondary: #98989d;
      --link: #2997ff;
      --separator: #38383a;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 56px 40px 48px;
    max-width: 360px; width: 100%;
    text-align: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 8px 32px rgba(0,0,0,.08);
  }
  .avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 24px;
    box-shadow: 0 4px 16px rgba(0,102,204,.25);
  }
  h1 {
    font-size: 24px; font-weight: 600;
    letter-spacing: .02em;
    margin-bottom: 8px;
  }
  .bio {
    font-size: 15px; color: var(--secondary);
    line-height: 1.6; margin-bottom: 28px;
  }
  .bio p + p { margin-top: 2px; }
  .divider {
    width: 40px; height: 1px; background: var(--separator);
    margin: 0 auto 28px;
  }
  .links { display: flex; flex-direction: column; gap: 10px; }
  .link {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid var(--separator);
    color: var(--link);
    text-decoration: none;
    font-size: 15px; font-weight: 500;
    transition: background .2s, border-color .2s;
  }
  .link:hover { background: rgba(0,102,204,.06); border-color: var(--link); }
  .link svg { flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <img class="avatar" src="touxiang.jpg" alt="俊宏">
  <h1>俊宏</h1>
  <div class="bio">
    <p>WeChat: qwetech</p>
  </div>
  <div class="divider"></div>
  <div class="links">
    <a class="link" href="https://github.com/11195666/" target="_blank" rel="noopener">

      GitHub
    </a>
  </div>
</div>
</body>
</html>
